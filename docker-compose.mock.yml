# Compose "mock": Fase 1 del POC. Nessuna dipendenza da Wine/MT5, funziona ovunque (incluso
# macOS). Forza MOCK_MODE=true a prescindere dal contenuto di .env, cosi' questo file resta
# sempre sicuro da eseguire senza credenziali reali.
#
# Uso:
#   cp .env.example .env   # opzionale, solo per personalizzare DRY_RUN/POLL_INTERVAL_SECONDS/LOG_LEVEL
#   docker compose -f docker-compose.mock.yml up --build

services:
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: mock
    image: tradejournal-mt5-cloud-worker:mock
    container_name: tradejournal-mt5-cloud-worker-mock
    environment:
      MOCK_MODE: "true"
      DRY_RUN: "${DRY_RUN:-true}"
      MT5_LOGIN: "${MT5_LOGIN:-}"
      MT5_PASSWORD: "${MT5_PASSWORD:-}"
      MT5_SERVER: "${MT5_SERVER:-}"
      TRADEJOURNAL_API_URL: "${TRADEJOURNAL_API_URL:-}"
      TRADEJOURNAL_BRIDGE_TOKEN: "${TRADEJOURNAL_BRIDGE_TOKEN:-}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-5}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/docker/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    cpus: 0.50
